name: mizubot-prod

services:
  mizubot:
    build:
      context: ..
    container_name: mizubot
    command: ["-config", "/config.yml"]
    volumes:
      - ./config.yml:/config.yml:ro
      - ./data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_PATH: "/data/mizubot.db"
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
