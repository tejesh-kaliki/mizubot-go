# Example config for MizuBot
discord_token: "Bot <your_token_here>"
database_path: "./reminders.db"
tick_interval: "10s"
anime:
  poll_interval: "1m"
  feed_url: "https://nyaa.si/?page=rss&c=1_2&f=0"
  public_feed_base_url: "https://feeds.example.com"
  bucket: "mizubot-anime-feeds"
  prefix: "anime"
aws:
  s3_access_key: "AKIA..."
  s3_secret_key: "secret"
  s3_region: "ap-south-1"
ollama:
  base_url: "http://localhost:11434"
  model: "llama3.2"
  timeout: "60s"

# Optional
env: "test"            # or "prod"
test_guild_id: "123456789012345678"
dry_run: true          # log sends instead of posting
